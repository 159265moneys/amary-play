<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Yummy</title>
<link rel="stylesheet" href="style.css?v=48">
</head>
<body>
<div id="app">

  <!-- app header (top, no phone status bar) -->
  <header class="appbar">
    <span class="icon-btn" aria-hidden="true"></span>
    <div class="brand"><img class="brand-logo" src="assets/logo/yummy_pink.webp?v=48" alt="Yummy"></div>
    <button class="icon-btn" aria-label="menu" data-icon="menu"></button>
  </header>

  <!-- game HUD -->
  <div class="runbar">
    <span id="progressText" class="run-count">0 / 20</span>
    <div class="run-track"><div id="progressFill" class="run-fill"></div></div>
  </div>

  <!-- scrollable profile -->
  <main id="scroll" class="scroll">
    <!-- スワイプでズレた時に見える判定: 白背景に黒字シロ / 黒背景に白字クロ（明朝） -->
    <div class="judge-layer"><span class="jw jw-shiro">シロ</span><span class="jw jw-kuro">クロ</span></div>
    <div id="profile" class="profile"></div>
  </main>

  <!-- クロ側へ傾けた時の心拍ビネット（縁がじわっと暗くなる） -->
  <div id="dread"></div>

  <!-- 設定ドロワー（左からスライド） -->
  <div id="drawerWrap" class="hidden">
    <div id="drawerBack"></div>
    <aside id="drawer"></aside>
  </div>

  <!-- pinned decision buttons -->
  <nav class="float-actions">
    <button class="act act-nope" data-act="nope" aria-label="クロ" data-icon="x"></button>
    <button class="act act-like" data-act="like" aria-label="シロ" data-icon="heart"></button>
  </nav>

  <!-- zoom viewer -->
  <div id="zoom" class="zoom hidden">
    <div class="zoom-inner"><img id="zoomImg" alt=""></div>
    <button id="zoomClose" class="zoom-close" data-icon="x"></button>
    <div class="zoom-hint">ドラッグで移動 / ホイール・ピンチで拡大</div>
  </div>

  <!-- tutorial layer -->
  <div id="tut" class="hidden"></div>

  <!-- 闇ファイル図鑑 -->
  <div id="darkfile" class="hidden"></div>

  <!-- overlay screens -->
  <div id="overlay" class="overlay hidden"></div>

</div>

<script src="icons.js?v=48"></script>
<script src="data.js?v=48"></script>
<script src="darkdesc.js?v=48"></script>
<script src="manifest.js?v=48"></script>
<script src="app.js?v=48"></script>
</body>
</html>
